project:
  type: website
  output-dir: _site
  resources:
    - examples/
  render:
    - index.qmd
    - syllabus.qmd
    - slides/index.qmd
    - slides/week-01-image-formation.qmd
    - project/index.qmd

website:
  title: "MATH 435: Mathematical Imaging"
  repo-url: "https://github.com/lnajman/math435-mathematical-imaging"
  repo-actions: [edit, issue]
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: slides/index.qmd
        text: Slides
      - href: syllabus.qmd
        text: Syllabus
      - href: project/index.qmd
        text: Project
  page-footer:
    left: "MATH 435: Mathematical Imaging"
    right: "Built with Quarto"

format:
  html:
    theme:
      - cosmo
      - assets/css/course.scss
    toc: true
    code-copy: true
    code-overflow: wrap
    html-math-method: katex

execute:
  freeze: auto
  warning: false
  message: false

