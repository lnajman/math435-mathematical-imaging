website:
  title: "MATH 435: Mathematical Imaging"
  repo-url: "https://github.com/lnajman/math435-mathematical-imaging"
  repo-actions: [edit, issue]
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: classes.qmd
        text: Classes
      - href: practice.qmd
        text: Practice
      - href: quizzes.qmd
        text: Quizzes
      - href: notebooks/index.qmd
        text: Notebooks
      - href: book/index.qmd
        text: Book
      - href: syllabus.qmd
        text: Syllabus
      - href: project/index.qmd
        text: Project
      - href: llm-use.qmd
        text: LLM Use
  sidebar:
    - title: "Online Book"
      style: "docked"
      search: true
      contents:
        - href: book/index.qmd
          text: Book home
        - href: book/motivation.qmd
          text: "Motivation: inverse problems to neural networks"
        - section: "Part I: Foundations"
          contents:
            - href: book/week-01-image-formation.qmd
              text: "1. Images as mathematical objects"
            - href: book/week-02-convolution-blur.qmd
              text: "2. Convolution and blur"
            - href: book/week-03-fourier-imaging.qmd
              text: "3. Fourier transform in imaging"
        - section: "Part II: Noise and Regularization"
          contents:
            - href: book/week-04-noise-likelihood.qmd
              text: "4. Noise models and likelihoods"
            - href: book/week-05-ill-posed-inverse-problems.qmd
              text: "5. Ill-posed inverse problems"
            - href: book/week-06-tikhonov-regularization.qmd
              text: "6. Tikhonov regularization"
        - section: "Part III: Variational Models and Optimization"
          contents:
            - href: book/week-07-variational-formulation.qmd
              text: "7. Variational formulation"
            - href: book/week-08-total-variation.qmd
              text: "8. Total Variation regularization"
            - href: book/week-09-optimization-methods.qmd
              text: "9. Optimization methods"
        - section: "Part IV: Sparse and Learned Priors"
          contents:
            - href: book/week-10-sparse-reconstruction.qmd
              text: "10. Sparse reconstruction"
            - href: book/week-11-wavelets.qmd
              text: "11. Wavelets and multiscale representation"
            - href: book/week-12-model-data.qmd
              text: "12. Model-based vs data-driven imaging"
            - href: book/week-13-plug-and-play.qmd
              text: "13. Plug-and-play and learned regularization"
        - section: "Part V: Reliability"
          contents:
            - href: book/week-14-stability-robustness-ethics.qmd
              text: "14. Stability, robustness, and ethics"
  page-footer:
    left: "MATH 435: Mathematical Imaging"
    right: "Built with Quarto"

format:
  html:
    theme:
      - cosmo
      - assets/css/course.scss
    toc: true
    code-copy: true
    code-overflow: wrap
    html-math-method: katex

execute:
  freeze: auto
  warning: false
  message: false
