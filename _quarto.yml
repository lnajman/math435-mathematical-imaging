project:
  type: website
  output-dir: _site
  resources:
    - examples/
    - notebooks/*.ipynb
  render:
    - index.qmd
    - syllabus.qmd
    - notebooks/index.qmd
    - book/index.qmd
    - book/week-01-image-formation.qmd
    - book/week-02-convolution-blur.qmd
    - book/week-03-fourier-imaging.qmd
    - slides/index.qmd
    - slides/template.qmd
    - slides/week-01-image-formation.qmd
    - slides/week-02-convolution-blur.qmd
    - slides/week-03-fourier-imaging.qmd
    - slides/week-04-noise-likelihood.qmd
    - slides/week-05-ill-posed-inverse-problems.qmd
    - slides/week-06-tikhonov-regularization.qmd
    - slides/week-07-variational-formulation.qmd
    - slides/week-08-total-variation.qmd
    - slides/week-09-optimization-methods.qmd
    - slides/week-10-sparse-reconstruction.qmd
    - slides/week-11-wavelets.qmd
    - slides/week-12-model-data.qmd
    - slides/week-13-plug-and-play.qmd
    - slides/week-14-stability-robustness-ethics.qmd
    - project/index.qmd

website:
  title: "MATH 435: Mathematical Imaging"
  repo-url: "https://github.com/lnajman/math435-mathematical-imaging"
  repo-actions: [edit, issue]
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: slides/index.qmd
        text: Slides
      - href: notebooks/index.qmd
        text: Notebooks
      - href: book/index.qmd
        text: Book
      - href: syllabus.qmd
        text: Syllabus
      - href: project/index.qmd
        text: Project
  sidebar:
    - title: "Online Book"
      style: "docked"
      search: true
      contents:
        - href: book/index.qmd
          text: Book home
        - section: "Part I: Foundations"
          contents:
            - href: book/week-01-image-formation.qmd
              text: "1. Images as mathematical objects"
            - href: book/week-02-convolution-blur.qmd
              text: "2. Convolution and blur"
            - href: book/week-03-fourier-imaging.qmd
              text: "3. Fourier transform in imaging"
  page-footer:
    left: "MATH 435: Mathematical Imaging"
    right: "Built with Quarto"

format:
  html:
    theme:
      - cosmo
      - assets/css/course.scss
    toc: true
    code-copy: true
    code-overflow: wrap
    html-math-method: katex

execute:
  freeze: auto
  warning: false
  message: false
